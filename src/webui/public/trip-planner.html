<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Planner - AI-Powered Itinerary with Maps</title>
  <link rel="stylesheet" href="trip-planner.css">
</head>
<body>
  <div class="app-container">
    <!-- Left Sidebar - Trip Tree View -->
    <aside class="sidebar sidebar-left" id="sidebar-left">
      <div class="sidebar-header">
        <h2>Trip Itinerary</h2>
        <button class="btn-icon" id="collapse-left" title="Collapse sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-content">
        <div class="tree-controls">
          <button class="btn-sm" id="expand-all">Expand All</button>
          <button class="btn-sm" id="collapse-all">Collapse All</button>
          <button class="btn-sm" id="toggle-all-markers">Show All</button>
        </div>
        <div class="tree-view" id="trip-tree">
          <div class="empty-state">
            <p>No trip loaded</p>
            <p class="hint">Enter a trip plan or load a markdown file to get started</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Toolbar -->
      <header class="toolbar">
        <div class="toolbar-group">
          <button class="btn-icon" id="toggle-left-sidebar" title="Toggle tree view">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
          </button>
          <h1 class="app-title">Trip Planner</h1>
        </div>
        <div class="toolbar-group toolbar-actions">
          <button class="btn" id="new-trip">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            New
          </button>
          <button class="btn" id="load-trip">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            Load
          </button>
          <button class="btn btn-primary" id="save-trip">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
              <polyline points="17,21 17,13 7,13 7,21"/>
              <polyline points="7,3 7,8 15,8"/>
            </svg>
            Save
          </button>
          <button class="btn" id="export-kml" title="Export checked tracks to KML">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            KML
          </button>
          <input type="file" id="file-input" accept=".md,.txt,.fit,.kml,.gpx" multiple hidden>
        </div>
        <div class="toolbar-group">
          <button class="btn-icon" id="toggle-right-sidebar" title="Toggle editor">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Map Container -->
      <div class="map-wrapper">
        <div id="map-container"></div>
        <div class="map-overlay map-legend" id="map-legend">
          <h4>Legend</h4>
          <div class="legend-items" id="legend-items">
            <!-- Dynamic legend items will be added here -->
          </div>
        </div>
        <div class="map-overlay map-controls">
          <button class="btn-icon" id="fit-bounds" title="Fit all markers">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
            </svg>
          </button>
          <button class="btn-icon" id="clear-markers" title="Clear all markers">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            </svg>
          </button>
        </div>
      </div>
    </main>

    <!-- Right Sidebar - Editor Panel -->
    <aside class="sidebar sidebar-right" id="sidebar-right">
      <div class="sidebar-header">
        <button class="btn-icon" id="collapse-right" title="Collapse sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
        <h2>Trip Editor</h2>
      </div>
      <div class="sidebar-content">
        <!-- Tab Navigation -->
        <div class="tabs">
          <button class="tab active" data-tab="input">Input Plan</button>
          <button class="tab" data-tab="markdown">Markdown</button>
          <button class="tab" data-tab="settings">Settings</button>
        </div>

        <!-- Input Tab -->
        <div class="tab-content active" id="tab-input">
          <div class="form-group">
            <label for="trip-input">Enter your trip plan</label>
            <textarea id="trip-input" placeholder="Describe your trip plan in natural language...

Example:
Day 1 - Beijing Arrival
- 9:00 AM: Arrive at Beijing Capital Airport
- 12:00 PM: Lunch at Wangfujing Street
- 3:00 PM: Visit Tiananmen Square
- 6:00 PM: Dinner at Quanjude Roast Duck

Day 2 - Great Wall Adventure
- 8:00 AM: Depart for Badaling Great Wall
- 12:00 PM: Lunch at local restaurant
- 4:00 PM: Return to hotel
"></textarea>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary btn-block" id="extract-locations">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
              </svg>
              Extract & Map Locations
            </button>
          </div>
          <div class="extraction-status" id="extraction-status"></div>
        </div>

        <!-- Markdown Tab -->
        <div class="tab-content" id="tab-markdown">
          <div class="form-group">
            <label for="markdown-output">Generated Markdown</label>
            <textarea id="markdown-output" placeholder="Markdown will be generated here..." readonly></textarea>
          </div>
          <div class="form-actions">
            <button class="btn" id="copy-markdown">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
              Copy
            </button>
            <button class="btn" id="edit-markdown">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              Edit
            </button>
            <button class="btn btn-primary" id="apply-markdown">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Apply Changes
            </button>
          </div>
        </div>

        <!-- Settings Tab -->
        <div class="tab-content" id="tab-settings">
          <div class="form-group">
            <label for="llm-provider">LLM Provider</label>
            <select id="llm-provider">
              <option value="local" selected>Local AI Server (OpenAI-compatible)</option>
              <option value="manual">Manual (No AI)</option>
            </select>
          </div>
          <div class="form-group" id="local-url-group">
            <label for="local-url">Local AI Server URL</label>
            <input type="text" id="local-url" value="http://localhost:4000" placeholder="http://localhost:4000">
          </div>
          <div class="form-group" id="local-model-group">
            <label for="local-model">Model Name</label>
            <input type="text" id="local-model" value="gpt-3.5-turbo" placeholder="gpt-3.5-turbo">
          </div>
          <div class="form-group" id="local-test-group">
            <button class="btn" id="test-local-ai" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
              Test Connection (Ping)
            </button>
          </div>
          <div class="form-group">
            <label for="ollama-model">Ollama Model</label>
            <input type="text" id="ollama-model" value="llama2" placeholder="llama2">
          </div>
          <div class="form-group">
            <label for="map-key">Tianditu API Key</label>
            <input type="text" id="map-key" placeholder="Enter Tianditu API key">
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" id="save-settings">Save Settings</button>
          </div>
          <div class="settings-info">
            <p><strong>Note:</strong> Settings are saved in browser localStorage.</p>
            <p><strong>Local AI:</strong> Uses OpenAI-compatible API at localhost:4000</p>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
    <p id="loading-text">Processing...</p>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="../../dist/fitsdk.global.prod.js"></script>
  <script src="../../dist/gcoord.global.prod.js"></script>
  <script src="trip-planner.js"></script>
</body>
</html>
